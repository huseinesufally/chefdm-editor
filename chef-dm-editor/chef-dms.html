<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chef DM Editor</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="stylesheet" href="chef-dms.css">
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>

<!-- EDITOR BAR -->
<div class="editor-bar">
  <a href="tony.html" class="btn btn-ghost" style="text-decoration:none;">← Tony</a>
  <div class="editor-bar-divider"></div>
  <span class="editor-bar-title">Chef DM</span>
  <div class="editor-bar-right">
    <button class="btn btn-ghost" onclick="togglePanel()">Participants</button>
    <button class="btn btn-ghost" onclick="enterPreview()">Preview</button>
    <div class="editor-bar-divider"></div>
    <button class="btn btn-outline" onclick="downloadPNG()">Export</button>
    <button class="btn btn-dark" onclick="sendToFigma()">Figma</button>
  </div>
</div>

<!-- TAB BAR (rendered by JS) -->
<div id="tab-bar"></div>

<!-- PARTICIPANTS PANEL -->
<div id="participants-panel">

  <!-- DM Header -->
  <div class="panel-section-title">Profile Header</div>
  <div class="participant-card">
    <div class="participant-card-header">
      <div class="p-avatar-wrap">
        <img id="p-header-photo-thumb" class="p-avatar" src="assets/profile-photo.png" alt="">
        <div class="p-avatar-btn" onclick="replaceHeaderPhoto()">Edit</div>
      </div>
      <div class="p-fields">
        <input class="p-input" id="p-chef-header-name" placeholder="Chef name" oninput="updateChefHeaderName(this.value)">
        <input class="p-input p-input-secondary" id="p-chef-header-handle" placeholder="handle_" oninput="updateChefHeaderHandle(this.value)">
      </div>
    </div>
    <input class="p-input" id="p-chef-header-venue" placeholder="Restaurant name" oninput="updateChefVenue(this.value)" style="margin-top:8px;">
  </div>

  <!-- Conversation -->
  <div class="panel-section-title">Conversation</div>

  <!-- Dorsia -->
  <div class="participant-card p-card-compact">
    <div class="p-card-row">
      <div class="p-card-info">
        <span class="p-card-name" id="dorsia-panel-label">Dorsia</span>
        <span class="p-card-side">Right side</span>
      </div>
    </div>
    <div class="p-color-swatches" id="dorsia-colors" style="margin-top:8px;"></div>
  </div>

  <!-- Chef -->
  <div class="participant-card p-card-compact">
    <div class="p-card-row">
      <div class="p-avatar-wrap p-avatar-sm">
        <img id="p-chef-avatar" class="p-avatar" src="assets/chef-avatar.png" alt="">
        <div class="p-avatar-btn" onclick="replaceParticipantAvatar('chef')">Edit</div>
      </div>
      <div class="p-card-info" style="flex:1;">
        <input class="p-input p-input-inline" id="p-chef-name" value="Chef" placeholder="Label" onchange="updateParticipantLabel('chef',this.value)">
        <span class="p-card-side">Left side</span>
      </div>
    </div>
    <div class="p-color-swatches" id="chef-colors" style="margin-top:8px;"></div>
  </div>

  <!-- Dynamic guests -->
  <div id="guests-section"></div>
  <button class="btn btn-outline" id="add-guest-btn" onclick="addGuest()" style="width:100%;margin-top:4px;justify-content:center;">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/></svg>
    Add Guest
  </button>

  <div class="panel-reset-section">
    <button class="btn btn-danger" onclick="resetAll()" style="width:100%;justify-content:center;font-size:11px;">Reset All Data</button>
  </div>

</div>

<!-- SEND TO FIGMA MODAL -->
<div id="figma-overlay" onclick="if(event.target===this)closeFigmaOverlay()">
  <div class="figma-card">
    <div class="figma-card-icon">✦</div>
    <div class="figma-card-title">Send to Figma</div>
    <div class="figma-card-body">Copy the prompt below and paste it into Claude — it'll drop straight into <strong>Evergreen Editorial → Chef DMs</strong>.</div>
    <div class="figma-prompt-box" id="figma-prompt-text"></div>
    <div class="figma-card-actions">
      <button class="figma-close-btn" onclick="closeFigmaOverlay()">Close</button>
      <button class="figma-copy-btn" id="figma-copy-btn" onclick="copyFigmaPrompt()">Copy prompt</button>
    </div>
  </div>
</div>

<!-- DM DESIGN -->
<div id="dm-design">

  <!-- HEADER -->
  <div class="dm-header">
    <img class="back-arrow" src="assets/back-arrow.svg" alt="">
    <div class="profile-area">
      <div class="profile-photo-wrap">
        <img id="img-profile" class="profile-photo" src="assets/profile-photo.png" alt="">
        <div class="profile-replace-btn" onclick="replacePhoto('img-profile')">Change</div>
      </div>
      <div>
        <div class="profile-name" contenteditable="true" spellcheck="false">Fardad Khayami</div>
        <div class="profile-handle" contenteditable="true" spellcheck="false">fardadk_</div>
      </div>
    </div>
    <img class="dorsia-logo" src="assets/dorsia-logo.svg" alt="Dorsia">
  </div>

  <!-- MESSAGES (rendered by JS) -->
  <div id="messages-container"></div>

  <!-- ADD MESSAGE BAR -->
  <div class="add-msg-bar" id="add-msg-bar"></div>

  <!-- FOOTER BANNER -->
  <div class="bottom-banner">
    <div class="dm-cam-btn">
      <svg width="46" height="46" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" fill="white"/>
        <circle cx="12" cy="13" r="4" fill="#405DE6"/>
        <circle cx="12" cy="13" r="2.4" fill="white" opacity="0.25"/>
      </svg>
    </div>
    <div class="dm-input-pill">
      <span class="dm-placeholder">Message...</span>
      <div class="dm-input-icons">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5"/>
          <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
          <circle cx="9" cy="9.5" r="1" fill="#000" stroke="none"/>
          <circle cx="15" cy="9.5" r="1" fill="#000" stroke="none"/>
        </svg>
      </div>
    </div>
  </div>

</div><!-- /dm-design -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
<script src="chef-dms.js"></script>
</body>
</html>
